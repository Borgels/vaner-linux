name: Release

# Fires on semver tags. `workflow_dispatch` runs a dry-run (build +
# sign + verify, no upload, no apt-repo push) for pipeline sanity
# without cutting a real version.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write # publish releases + push to gh-pages

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-22.04 # oldest supported glibc → .deb/.AppImage run on 22.04+
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: refuse unconfigured releases
        run: |
          set -e
          fail() { echo "::error::$1"; exit 1; }

          # Signing / updater placeholders.
          grep -q "REPLACE_WITH_40_CHAR_FINGERPRINT" scripts/install.sh \
            && fail "scripts/install.sh still has the placeholder fingerprint."
          ! grep -q "BEGIN PGP PUBLIC KEY BLOCK" scripts/release-key.asc \
            && fail "scripts/release-key.asc is missing the PGP block."
          grep -q "^# Placeholder\." scripts/release-key.asc \
            && fail "scripts/release-key.asc still has the placeholder body."
          grep -q "REPLACE_WITH_TAURI_UPDATER_PUBKEY" src-tauri/tauri.conf.json \
            && fail "src-tauri/tauri.conf.json is missing the updater pubkey."

          # Bundle metadata. Without these, the released .deb shows
          # "Maintainer: vaner" / "Publisher: Unknown" / no copyright,
          # which is what slipped through into v0.2.2.
          conf=src-tauri/tauri.conf.json
          [ -z "$(jq -r '.bundle.publisher // empty' $conf)" ] \
            && fail "$conf bundle.publisher is empty (shows as Maintainer/Publisher in .deb / NSIS)."
          [ -z "$(jq -r '.bundle.copyright // empty' $conf)" ] \
            && fail "$conf bundle.copyright is empty."
          [ -z "$(jq -r '.bundle.homepage // empty' $conf)" ] \
            && fail "$conf bundle.homepage is empty."
          [ -z "$(jq -r '.bundle.license // empty' $conf)" ] \
            && fail "$conf bundle.license is empty."
          [ -z "$(jq -r '.bundle.shortDescription // empty' $conf)" ] \
            && fail "$conf bundle.shortDescription is empty."

          # Version triple stays in lock-step (package.json, Cargo.toml,
          # tauri.conf.json all advertise the same version to users).
          tauri_v=$(jq -r '.version' $conf)
          pkg_v=$(jq -r '.version' package.json)
          cargo_v=$(awk -F'"' '/^version/ {print $2; exit}' src-tauri/Cargo.toml)
          if [ "$tauri_v" != "$pkg_v" ] || [ "$tauri_v" != "$cargo_v" ]; then
            fail "version mismatch: tauri.conf.json=$tauri_v package.json=$pkg_v Cargo.toml=$cargo_v"
          fi

          # Cargo.toml authorship.
          ! grep -q "^authors" src-tauri/Cargo.toml \
            && fail "src-tauri/Cargo.toml is missing [package].authors."

          echo "all release-time placeholders resolved."

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            dpkg-sig \
            gnupg \
            reprepro

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: corepack enable && corepack prepare pnpm@latest --activate
      - run: pnpm install --frozen-lockfile

      - name: enable bundle for this run
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.bundle.active=true;fs.writeFileSync(p,JSON.stringify(j,null,2));"
          grep '"active":' src-tauri/tauri.conf.json

      - name: build .deb + .AppImage via tauri-bundler
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles deb,appimage

      - name: collect + rename Linux artifacts
        id: collect
        run: |
          set -e
          bundle_root="src-tauri/target/release/bundle"
          raw_deb=$(find "$bundle_root/deb" -maxdepth 1 -name "*.deb" -print -quit)
          raw_app=$(find "$bundle_root/appimage" -maxdepth 1 -name "*.AppImage" -print -quit)
          [[ -n "$raw_deb" ]] || { echo "::error::tauri produced no .deb"; exit 1; }
          [[ -n "$raw_app" ]] || { echo "::error::tauri produced no .AppImage"; exit 1; }

          # tauri-bundler names artifacts after productName ("Vaner Desktop"),
          # so the file names contain a space. Rename to a hyphenated lowercase
          # convention up front: dpkg-sig word-splits its arguments, apt URLs
          # need to be predictable, and the updater manifest embeds the file
          # name into latest.json. The .deb's internal `Package:` name (which
          # `apt install` uses) is unaffected.
          version=$(jq -r .version src-tauri/tauri.conf.json)
          deb_path="$bundle_root/deb/vaner-desktop_${version}_amd64.deb"
          app_path="$bundle_root/appimage/vaner-desktop_${version}_amd64.AppImage"
          [[ "$raw_deb" != "$deb_path" ]] && mv -- "$raw_deb" "$deb_path"
          [[ "$raw_app" != "$app_path" ]] && mv -- "$raw_app" "$app_path"
          # Tauri emits a sidecar .AppImage.sig — follow the rename.
          raw_sig=$(find "$bundle_root/appimage" -maxdepth 1 -name "*.AppImage.sig" -print -quit || true)
          if [[ -n "$raw_sig" && "$raw_sig" != "$app_path.sig" ]]; then
            mv -- "$raw_sig" "$app_path.sig"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "deb_path=$deb_path" >> "$GITHUB_OUTPUT"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          find "$bundle_root" -maxdepth 3 -type f | sort

      - name: upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            src-tauri/target/release/bundle/deb/vaner-desktop_*_amd64.deb
            src-tauri/target/release/bundle/appimage/vaner-desktop_*_amd64.AppImage
            src-tauri/target/release/bundle/appimage/vaner-desktop_*_amd64.AppImage.sig
          if-no-files-found: error
          retention-days: 7

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: corepack enable
        shell: pwsh
      - run: corepack prepare pnpm@latest --activate
        shell: pwsh
      - run: pnpm install --frozen-lockfile
        shell: pwsh

      - name: enable bundle for this run
        shell: pwsh
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.bundle.active=true;fs.writeFileSync(p,JSON.stringify(j,null,2));"
          Select-String -Path src-tauri/tauri.conf.json -Pattern '"active":'

      - name: build NSIS installer via tauri-bundler
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles nsis

      - name: collect + rename Windows artifacts
        id: collect
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle/nsis"
          $version = (node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          # Tauri v2 NSIS produces a single `*-setup.exe` plus a `*-setup.exe.sig`
          # (minisign over the .exe). The updater downloads the .exe directly
          # and replaces in place — there is no separate .nsis.zip.
          $rawExe = Get-ChildItem -Path $bundleRoot -Filter "*-setup.exe" | Select-Object -First 1
          $rawSig = Get-ChildItem -Path $bundleRoot -Filter "*-setup.exe.sig" | Select-Object -First 1
          if (-not $rawExe) { Write-Error "::error::tauri produced no NSIS .exe"; exit 1 }
          if (-not $rawSig) { Write-Error "::error::tauri produced no NSIS .exe.sig (TAURI_SIGNING_PRIVATE_KEY missing?)"; exit 1 }

          $exeName = "vaner-desktop_${version}_x64-setup.exe"
          $sigName = "vaner-desktop_${version}_x64-setup.exe.sig"
          if ($rawExe.Name -ne $exeName) { Rename-Item -Path $rawExe.FullName -NewName $exeName }
          if ($rawSig.Name -ne $sigName) { Rename-Item -Path $rawSig.FullName -NewName $sigName }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Get-ChildItem $bundleRoot

      - name: upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/nsis/vaner-desktop_*_x64-setup.exe
            src-tauri/target/release/bundle/nsis/vaner-desktop_*_x64-setup.exe.sig
          if-no-files-found: error
          retention-days: 7

  build-macos:
    runs-on: macos-14 # Apple Silicon runner; produces a universal-2 .dmg via tauri-bundler
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: corepack enable && corepack prepare pnpm@latest --activate
      - run: pnpm install --frozen-lockfile

      - name: enable bundle for this run
        run: |
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.bundle.active=true;fs.writeFileSync(p,JSON.stringify(j,null,2));"
          grep '"active"' src-tauri/tauri.conf.json | head -1

      - name: configure optional Apple signing
        env:
          APPLE_CERTIFICATE_SECRET: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          names=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_ID
            APPLE_PASSWORD
            APPLE_TEAM_ID
          )
          values=(
            "$APPLE_CERTIFICATE_SECRET"
            "$APPLE_CERTIFICATE_PASSWORD_SECRET"
            "$APPLE_SIGNING_IDENTITY_SECRET"
            "$APPLE_ID_SECRET"
            "$APPLE_PASSWORD_SECRET"
            "$APPLE_TEAM_ID_SECRET"
          )

          present=0
          missing=()
          for i in "${!names[@]}"; do
            if [[ -n "${values[$i]}" ]]; then
              present=$((present + 1))
            else
              missing+=("${names[$i]}")
            fi
          done

          if (( present == 0 )); then
            echo "Apple signing secrets are absent; building an unsigned .dmg."
            exit 0
          fi
          if (( present != ${#names[@]} )); then
            printf '::error::Partial Apple signing configuration; missing: %s\n' "${missing[*]}"
            exit 1
          fi

          for i in "${!names[@]}"; do
            {
              printf '%s<<__VANER_APPLE_SECRET__\n' "${names[$i]}"
              printf '%s\n' "${values[$i]}"
              printf '__VANER_APPLE_SECRET__\n'
            } >> "$GITHUB_ENV"
          done
          echo "Apple signing secrets are complete; signing and notarization enabled."

      - name: build .dmg via tauri-bundler (universal arm64 + x86_64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles dmg --target universal-apple-darwin

      - name: collect + rename macOS artifacts
        id: collect
        run: |
          set -e
          bundleRoot="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          version=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          dmg=$(ls "$bundleRoot"/*.dmg | head -1)
          if [ -z "$dmg" ]; then
            echo "::error::tauri-bundler produced no .dmg under $bundleRoot"
            exit 1
          fi
          target_name="vaner-desktop_${version}_universal.dmg"
          if [ "$(basename "$dmg")" != "$target_name" ]; then
            mv "$dmg" "$bundleRoot/$target_name"
          fi
          # Tauri's macOS updater signature lives next to the .app inside
          # the .dmg, but the public detached `.dmg.sig` (minisign) is
          # only emitted when TAURI_SIGNING_PRIVATE_KEY is set. Best-
          # effort copy if it exists.
          sig=$(ls "$bundleRoot"/*.dmg.sig 2>/dev/null | head -1 || true)
          if [ -n "$sig" ]; then
            target_sig="vaner-desktop_${version}_universal.dmg.sig"
            [ "$(basename "$sig")" != "$target_sig" ] && mv "$sig" "$bundleRoot/$target_sig"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          ls -la "$bundleRoot"

      - name: upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/vaner-desktop_*_universal.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/vaner-desktop_*_universal.dmg.sig
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: install system deps for signing + apt repo
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-sig \
            gnupg \
            reprepro

      - name: download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: artifacts/linux

      - name: download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: artifacts/windows

      - name: download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-bundle
          path: artifacts/macos

      - name: stage artifacts into the bundle layout sign-artifacts.sh expects
        id: stage
        run: |
          set -e
          bundle_root="artifacts/bundle"
          mkdir -p "$bundle_root/deb" "$bundle_root/appimage" "$bundle_root/nsis" "$bundle_root/dmg"

          # actions/upload-artifact@v4 preserves the source directory
          # tree, so the downloaded artifacts land somewhere under
          # artifacts/{linux,windows,macos}/. Find each file by name and
          # move it into the flat layout sign-artifacts.sh expects.
          find artifacts/linux  -name "*.deb"           -exec mv {} "$bundle_root/deb/"      \;
          find artifacts/linux  -name "*.AppImage"      -exec mv {} "$bundle_root/appimage/" \;
          find artifacts/linux  -name "*.AppImage.sig"  -exec mv {} "$bundle_root/appimage/" \;
          find artifacts/windows -name "*-setup.exe"     -exec mv {} "$bundle_root/nsis/"    \;
          find artifacts/windows -name "*-setup.exe.sig" -exec mv {} "$bundle_root/nsis/"    \;
          find artifacts/macos   -name "*.dmg"           -exec mv {} "$bundle_root/dmg/"     \;
          find artifacts/macos   -name "*.dmg.sig"       -exec mv {} "$bundle_root/dmg/"     \;

          deb_path=$(ls "$bundle_root/deb"/vaner-desktop_*_amd64.deb)
          app_path=$(ls "$bundle_root/appimage"/vaner-desktop_*_amd64.AppImage)
          exe_path=$(ls "$bundle_root/nsis"/vaner-desktop_*_x64-setup.exe)
          dmg_path=$(ls "$bundle_root/dmg"/vaner-desktop_*_universal.dmg 2>/dev/null || true)
          version=$(echo "$deb_path" | sed -E 's/.*vaner-desktop_([^_]+)_.*/\1/')

          echo "bundle_root=$bundle_root" >> "$GITHUB_OUTPUT"
          echo "deb_path=$deb_path" >> "$GITHUB_OUTPUT"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          echo "exe_path=$exe_path" >> "$GITHUB_OUTPUT"
          [ -n "$dmg_path" ] && echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          find "$bundle_root" -type f | sort

      - name: sign all bundles + SHA256SUMS
        env:
          VANER_RELEASE_GPG_PRIVKEY: ${{ secrets.VANER_RELEASE_GPG_PRIVKEY }}
          VANER_RELEASE_GPG_PASSPHRASE: ${{ secrets.VANER_RELEASE_GPG_PASSPHRASE }}
          VANER_RELEASE_GPG_FINGERPRINT: ${{ secrets.VANER_RELEASE_GPG_FINGERPRINT }}
        run: |
          chmod +x scripts/ci/sign-artifacts.sh
          ./scripts/ci/sign-artifacts.sh "${{ steps.stage.outputs.bundle_root }}"

      - name: verify signatures before any upload
        run: |
          chmod +x scripts/ci/verify-artifacts.sh
          ./scripts/ci/verify-artifacts.sh "${{ steps.stage.outputs.bundle_root }}"

      - name: compose latest.json updater manifest (linux + windows + optional darwin)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        id: manifest
        run: |
          set -euo pipefail
          bundle_root="${{ steps.stage.outputs.bundle_root }}"
          app_sig=$(find "$bundle_root/appimage" -maxdepth 1 -name "*.AppImage.sig" -print -quit)
          win_sig=$(find "$bundle_root/nsis" -maxdepth 1 -name "*.exe.sig" -print -quit)
          dmg_path=$(find "$bundle_root/dmg" -maxdepth 1 -name "*.dmg" -print -quit || true)
          dmg_sig=$(find "$bundle_root/dmg" -maxdepth 1 -name "*.dmg.sig" -print -quit || true)
          [[ -n "$app_sig" ]] || { echo "::error::missing AppImage .sig"; exit 1; }
          [[ -n "$win_sig" ]] || { echo "::error::missing NSIS .exe.sig"; exit 1; }
          app_sig_content=$(tr -d '\n' < "$app_sig")
          win_sig_content=$(tr -d '\n' < "$win_sig")
          app_name=$(basename "${{ steps.stage.outputs.app_path }}")
          exe_name=$(basename "${{ steps.stage.outputs.exe_path }}")
          version="${GITHUB_REF_NAME#v}"
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          app_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${app_name}"
          win_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${exe_name}"
          dmg_url=""; dmg_sig_content=""
          if [[ -n "$dmg_path" && -n "$dmg_sig" ]]; then
            dmg_name=$(basename "$dmg_path")
            dmg_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${dmg_name}"
            dmg_sig_content=$(tr -d '\n' < "$dmg_sig")
          fi
          out="$bundle_root/latest.json"
          python3 - <<PY > "$out"
          import json, os
          platforms = {
              "linux-x86_64":   {"signature": "${app_sig_content}", "url": "${app_url}"},
              "windows-x86_64": {"signature": "${win_sig_content}", "url": "${win_url}"},
          }
          if "${dmg_url}" and "${dmg_sig_content}":
              platforms["darwin-universal"] = {
                  "signature": "${dmg_sig_content}",
                  "url": "${dmg_url}",
              }
          print(json.dumps({
              "version":  "${version}",
              "pub_date": "${pub_date}",
              "notes":    "See the v${version} release notes at https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}",
              "platforms": platforms,
          }, indent=2))
          PY
          echo "latest_json_path=$out" >> "$GITHUB_OUTPUT"
          cat "$out"

      - name: publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2
        with:
          files: |
            ${{ steps.stage.outputs.deb_path }}
            ${{ steps.stage.outputs.deb_path }}.asc
            ${{ steps.stage.outputs.app_path }}
            ${{ steps.stage.outputs.app_path }}.asc
            ${{ steps.stage.outputs.exe_path }}
            ${{ steps.stage.outputs.exe_path }}.asc
            ${{ steps.stage.outputs.exe_path }}.sig
            ${{ steps.stage.outputs.bundle_root }}/dmg/*.dmg
            ${{ steps.stage.outputs.bundle_root }}/dmg/*.dmg.asc
            ${{ steps.stage.outputs.bundle_root }}/SHA256SUMS
            ${{ steps.stage.outputs.bundle_root }}/SHA256SUMS.asc
            ${{ steps.manifest.outputs.latest_json_path }}
            scripts/release-key.asc
          generate_release_notes: true
          fail_on_unmatched_files: false

      # ----- third-party catalogue updates ------------------------------
      # Each tagged release auto-PRs the new version into the catalogues
      # users install through. The catalogues need write access to push
      # to a fork of the upstream repo, so each step pulls a separate
      # token from secrets:
      #   WINGET_TOKEN     — PAT with `public_repo` scope on a fork of
      #                      microsoft/winget-pkgs under your account
      #   HOMEBREW_TAP_TOKEN — PAT with `repo` scope on
      #                        Borgels/homebrew-vaner
      # Both steps are fail-soft (`continue-on-error`) so a missing
      # secret on a green release isn't a regression — we'd rather
      # publish the GitHub release and let the user PR the catalogue
      # bump by hand than fail the whole pipeline.
      - name: setup wingetcreate (Windows runner not required for this step)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          # wingetcreate ships as a self-contained .NET tool; install via
          # `dotnet tool install -g` so it works on the linux runner the
          # release job already uses.
          if ! command -v wingetcreate >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends dotnet-sdk-8.0
            dotnet tool install --global Microsoft.WindowsPackageManager.WingetCreate
            echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          fi
        continue-on-error: true

      - name: PR Vaner.Desktop manifest update to microsoft/winget-pkgs
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${WINGET_TOKEN:-}" ]]; then
            echo "::warning::WINGET_TOKEN secret is not set; skipping winget-pkgs auto-PR."
            echo "Set up a fork of microsoft/winget-pkgs under your account and store a PAT (public_repo scope) as WINGET_TOKEN to enable."
            exit 0
          fi
          version="${TAG#v}"
          exe_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/vaner-desktop_${version}_x64-setup.exe"
          export PATH="$HOME/.dotnet/tools:$PATH"
          # `wingetcreate update` reads the existing manifest from the
          # upstream catalogue, edits version + URL + computes the
          # SHA256, and pushes the PR through the user's fork. `--submit`
          # opens the PR; the bot validation runs the same suite the
          # initial 0.2.4 PR went through.
          wingetcreate update Vaner.Desktop \
            --urls "$exe_url" \
            --version "$version" \
            --token "$WINGET_TOKEN" \
            --submit
        continue-on-error: true

      - name: bump Homebrew Cask in Borgels/homebrew-vaner
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN secret is not set; skipping homebrew-vaner cask bump."
            echo "Create a fine-grained PAT with 'Contents: Read & Write' on Borgels/homebrew-vaner and store as HOMEBREW_TAP_TOKEN."
            exit 0
          fi
          version="${TAG#v}"
          dmg_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/vaner-desktop_${version}_universal.dmg"
          # Pull the .dmg sha256 from the staged bundle (sign-artifacts.sh
          # left a SHA256SUMS we can grep). Fall back to computing it on
          # the fly if needed.
          dmg_path="${{ steps.stage.outputs.bundle_root }}/dmg/vaner-desktop_${version}_universal.dmg"
          if [[ ! -f "$dmg_path" ]]; then
            echo "::warning::no .dmg at $dmg_path; the macOS build presumably skipped or renamed. Skipping cask bump."
            exit 0
          fi
          dmg_sha=$(sha256sum "$dmg_path" | awk '{print $1}')
          tap_dir="$RUNNER_TEMP/homebrew-vaner"
          rm -rf "$tap_dir"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Borgels/homebrew-vaner.git" "$tap_dir"
          cask="$tap_dir/Casks/vaner-desktop.rb"
          # Switch the cask to source from this repo's release artifacts
          # and update version + sha256. The `verified:` prefix follows
          # Homebrew's URL-spoofing-defence convention; we point it at
          # this repo since Tauri-built .dmgs now live here.
          python3 - <<PY
          from pathlib import Path
          import re
          p = Path("$cask")
          text = p.read_text()
          text = re.sub(r'version "[^"]+"',  'version "$version"',  text, count=1)
          text = re.sub(r'sha256 "[^"]+"',   'sha256 "$dmg_sha"',   text, count=1)
          # Switch URL + verified prefix to this repo when first .dmg ships.
          text = re.sub(
              r'url "https://github\.com/[^"]+",\s*\n\s*verified: "[^"]+"',
              ('url "https://github.com/${GITHUB_REPOSITORY}/releases/download/'
               'v#{version}/vaner-desktop_#{version}_universal.dmg",\n'
               '      verified: "github.com/${GITHUB_REPOSITORY}/"'),
              text,
              count=1,
              flags=re.MULTILINE,
          )
          p.write_text(text)
          PY
          cd "$tap_dir"
          git config user.email "6937877+abolsen@users.noreply.github.com"
          git config user.name "vaner-release-bot"
          git add Casks/vaner-desktop.rb
          if git diff --cached --quiet; then
            echo "no cask changes; nothing to push"
            exit 0
          fi
          git commit -m "vaner-desktop ${version}

          Auto-bumped by Borgels/vaner-desktop release.yml on tag push."
          git push origin HEAD:main
        continue-on-error: true

      # ----- apt repo publish (gh-pages) — Linux .deb only --------------
      - name: checkout gh-pages
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: true
        continue-on-error: true # first-run: branch may not exist yet

      - name: initialize gh-pages if absent
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          if [[ ! -d gh-pages/.git ]]; then
            mkdir -p gh-pages
            cd gh-pages
            git init -q
            git checkout -q -b gh-pages
            git remote add origin "https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          fi
          cd gh-pages
          git config user.email "release@vaner.ai"
          git config user.name  "Vaner release"

      - name: add .nojekyll + refresh apt repo
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          VANER_RELEASE_GPG_PRIVKEY: ${{ secrets.VANER_RELEASE_GPG_PRIVKEY }}
          VANER_RELEASE_GPG_PASSPHRASE: ${{ secrets.VANER_RELEASE_GPG_PASSPHRASE }}
          VANER_RELEASE_GPG_FINGERPRINT: ${{ secrets.VANER_RELEASE_GPG_FINGERPRINT }}
        run: |
          chmod +x scripts/ci/build-apt-repo.sh
          touch gh-pages/.nojekyll
          ./scripts/ci/build-apt-repo.sh gh-pages "${{ steps.stage.outputs.deb_path }}"

      - name: commit + push gh-pages
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          cd gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "gh-pages up to date — nothing to commit."
          else
            git commit -m "release: ${GITHUB_REF_NAME}"
            git push origin gh-pages
          fi

      - name: dry-run notice
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "::notice::Dry run complete — Linux + Windows + macOS artifacts built + signed + verified."
          echo "Skipped: GitHub Release upload, apt-repo publish."
          ls -la "${{ steps.stage.outputs.bundle_root }}"
